<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guangzhou | Start Journey</title>
  <style>
    :root {
      --midnight: #0F1C2E;
      --city-blue: #1F3A5F;
      --neon-purple: #7A5CFF;
      --warm-gold: #F2B880;
      --mist-white: #F5F5F5;
      --soft-line: rgba(245, 245, 245, 0.14);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, var(--midnight) 0%, #152744 45%, var(--city-blue) 100%);
      color: var(--mist-white);
    }

    body {
      position: relative;
    }

    .landing {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
      overflow: hidden;
    }

    /* animated background glow */
    .landing::before,
    .landing::after {
      content: "";
      position: absolute;
      inset: -20%;
      pointer-events: none;
      z-index: -3;
    }

    .landing::before {
      background:
        radial-gradient(circle at 20% 30%, rgba(122, 92, 255, 0.28), transparent 18%),
        radial-gradient(circle at 75% 25%, rgba(242, 184, 128, 0.20), transparent 15%),
        radial-gradient(circle at 50% 75%, rgba(122, 92, 255, 0.16), transparent 20%);
      animation: floatGlow 12s ease-in-out infinite alternate;
      filter: blur(12px);
    }

    .landing::after {
      background:
        linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.05) 40%, transparent 60%),
        linear-gradient(300deg, transparent 25%, rgba(242,184,128,0.06) 45%, transparent 65%);
      animation: sweepLight 9s linear infinite;
      opacity: 0.75;
    }

    .light-beam {
      position: absolute;
      bottom: -20%;
      width: 30vw;
      max-width: 360px;
      height: 90vh;
      background: linear-gradient(to top, rgba(242, 184, 128, 0.12), rgba(122, 92, 255, 0.05), transparent);
      filter: blur(12px);
      transform-origin: bottom center;
      opacity: 0.65;
      z-index: -2;
      mix-blend-mode: screen;
    }

    .beam-1 {
      left: 8%;
      transform: rotate(-18deg);
      animation: beamMove1 8s ease-in-out infinite alternate;
    }

    .beam-2 {
      right: 10%;
      transform: rotate(20deg);
      animation: beamMove2 10s ease-in-out infinite alternate;
    }

    .beam-3 {
      left: 45%;
      width: 18vw;
      transform: rotate(4deg);
      animation: beamMove3 7s ease-in-out infinite alternate;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particles span {
      position: absolute;
      display: block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(245, 245, 245, 0.75);
      box-shadow: 0 0 10px rgba(245, 245, 245, 0.45);
      animation: riseParticle linear infinite;
    }

    .content {
      position: relative;
      text-align: center;
      padding: 1.5rem;
      width: min(90%, 880px);
      z-index: 3;
      margin-top: -8vh;
    }

    .eyebrow {
      display: inline-block;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-size: 0.78rem;
      color: rgba(245, 245, 245, 0.75);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(2.6rem, 6vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(122, 92, 255, 0.22);
    }

    .subtitle {
      width: min(90%, 700px);
      margin: 1.4rem auto 0;
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      line-height: 1.8;
      color: rgba(245, 245, 245, 0.86);
    }

    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 2rem;
      padding: 0.95rem 1.8rem;
      border: 1px solid rgba(242, 184, 128, 0.55);
      border-radius: 999px;
      background: rgba(245, 245, 245, 0.06);
      color: var(--mist-white);
      text-decoration: none;
      font-size: 0.98rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 0 rgba(242, 184, 128, 0),
        0 0 18px rgba(122, 92, 255, 0.16);
      transition: transform 0.35s ease, background 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      animation: pulseBtn 2.6s ease-in-out infinite;
    }

    .enter-btn:hover {
      transform: translateY(-4px) scale(1.02);
      background: rgba(245, 245, 245, 0.1);
      border-color: rgba(242, 184, 128, 0.9);
      box-shadow:
        0 0 24px rgba(242, 184, 128, 0.25),
        0 0 40px rgba(122, 92, 255, 0.18);
    }

    .enter-btn span {
      font-size: 1.05rem;
    }

    /* skyline */
    .city-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 22vh;
      background:
        linear-gradient(to top, rgba(9, 17, 28, 0.95), rgba(9, 17, 28, 0.2)),
        repeating-linear-gradient(
          to right,
          rgba(255,255,255,0.03) 0 2px,
          transparent 2px 40px
        );
      clip-path: polygon(
        0% 100%, 0% 55%, 6% 55%, 6% 38%, 10% 38%, 10% 62%, 15% 62%, 15% 45%, 20% 45%, 20% 68%,
        28% 68%, 28% 40%, 32% 40%, 32% 52%, 36% 52%, 36% 30%, 40% 30%, 40% 60%, 47% 60%, 47% 42%,
        53% 42%, 53% 64%, 60% 64%, 60% 35%, 65% 35%, 65% 56%, 71% 56%, 71% 44%, 76% 44%, 76% 66%,
        83% 66%, 83% 50%, 88% 50%, 88% 34%, 92% 34%, 92% 60%, 100% 60%, 100% 100%
      );
      opacity: 0.95;
      z-index: 1;
    }

    .city-line::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 40%, rgba(242,184,128,0.08), transparent 18%),
        radial-gradient(circle at 75% 55%, rgba(122,92,255,0.08), transparent 16%);
    }

    /* Guangzhou Tower silhouette */
    .tower-scene {
      position: absolute;
      bottom: 9vh;
      left: 50%;
      width: 180px;
      height: 62vh;
      transform: translateX(-50%);
      z-index: 2;
      pointer-events: none;
    }

    .tower {
      position: absolute;
      bottom: -120%;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 100%;
      transition: bottom 2.2s cubic-bezier(0.2, 0.85, 0.2, 1);
      filter: drop-shadow(0 0 18px rgba(122, 92, 255, 0.55))
              drop-shadow(0 0 28px rgba(242, 184, 128, 0.18));
    }

    .tower.rise {
      bottom: 0;
    }

    .shaft {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 55%;
      background: linear-gradient(to top, rgba(242,184,128,0.9), rgba(245,245,245,0.95));
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(242, 184, 128, 0.45);
    }

    .waist {
      position: absolute;
      left: 50%;
      bottom: 20%;
      width: 86px;
      height: 180px;
      transform: translateX(-50%);
      border: 3px solid rgba(245,245,245,0.92);
      border-top-width: 5px;
      border-bottom-width: 5px;
      border-radius: 45% 45% 40% 40% / 32% 32% 48% 48%;
      box-shadow:
        0 0 16px rgba(122, 92, 255, 0.35),
        inset 0 0 12px rgba(242, 184, 128, 0.16);
      background: linear-gradient(
        to bottom,
        rgba(122,92,255,0.18),
        rgba(255,255,255,0.05),
        rgba(242,184,128,0.15)
      );
    }

    .waist::before,
    .waist::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 108px;
      height: 3px;
      transform: translateX(-50%);
      background: rgba(245,245,245,0.88);
      box-shadow: 0 0 8px rgba(245,245,245,0.4);
    }

    .waist::before { top: 28%; }
    .waist::after  { bottom: 28%; }

    .top-sphere {
      position: absolute;
      left: 50%;
      bottom: 54%;
      transform: translateX(-50%);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #f2b880 55%, #7a5cff 100%);
      box-shadow:
        0 0 18px rgba(242, 184, 128, 0.4),
        0 0 26px rgba(122, 92, 255, 0.28);
    }

    .mid-sphere {
      position: absolute;
      left: 50%;
      bottom: 28%;
      transform: translateX(-50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #f2b880 58%, #7a5cff 100%);
      box-shadow:
        0 0 14px rgba(242, 184, 128, 0.32),
        0 0 20px rgba(122, 92, 255, 0.22);
    }

    .antenna {
      position: absolute;
      left: 50%;
      bottom: 61%;
      transform: translateX(-50%);
      width: 6px;
      height: 28%;
      border-radius: 999px;
      background: linear-gradient(to top, rgba(245,245,245,0.92), rgba(242,184,128,0.95));
      box-shadow: 0 0 14px rgba(242, 184, 128, 0.42);
    }

    .glow-ring {
      position: absolute;
      left: 50%;
      bottom: 47%;
      transform: translateX(-50%);
      width: 104px;
      height: 24px;
      border: 2px solid rgba(242, 184, 128, 0.82);
      border-radius: 50%;
      box-shadow:
        0 0 14px rgba(242, 184, 128, 0.42),
        inset 0 0 10px rgba(245,245,245,0.2);
      animation: ringPulse 2.4s ease-in-out infinite;
    }

    .base {
      position: absolute;
      left: 50%;
      bottom: 9%;
      transform: translateX(-50%);
      width: 84px;
      height: 36px;
      background: linear-gradient(to top, rgba(122,92,255,0.28), rgba(242,184,128,0.35));
      border: 2px solid rgba(245,245,245,0.8);
      border-radius: 50% 50% 16px 16px;
      box-shadow: 0 0 16px rgba(122, 92, 255, 0.26);
    }

    .ground-glow {
      position: absolute;
      left: 50%;
      bottom: 5vh;
      transform: translateX(-50%);
      width: min(460px, 60vw);
      height: 80px;
      background: radial-gradient(ellipse at center, rgba(122,92,255,0.3), rgba(242,184,128,0.12), transparent 70%);
      filter: blur(10px);
      z-index: 0;
      animation: groundPulse 3.4s ease-in-out infinite;
    }

    @keyframes floatGlow {
      0%   { transform: translate3d(-2%, -1%, 0) scale(1); }
      100% { transform: translate3d(2%, 2%, 0) scale(1.08); }
    }

    @keyframes sweepLight {
      0%   { transform: translateX(-12%) translateY(0); }
      100% { transform: translateX(12%) translateY(-2%); }
    }

    @keyframes beamMove1 {
      from { transform: rotate(-18deg) translateY(0); opacity: 0.52; }
      to   { transform: rotate(-11deg) translateY(-12px); opacity: 0.8; }
    }

    @keyframes beamMove2 {
      from { transform: rotate(20deg) translateY(0); opacity: 0.48; }
      to   { transform: rotate(12deg) translateY(-18px); opacity: 0.78; }
    }

    @keyframes beamMove3 {
      from { transform: rotate(4deg) scaleY(1); opacity: 0.32; }
      to   { transform: rotate(-2deg) scaleY(1.08); opacity: 0.52; }
    }

    @keyframes riseParticle {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      10% { opacity: 0.7; }
      100% {
        transform: translateY(-110vh) scale(1.25);
        opacity: 0;
      }
    }

    @keyframes pulseBtn {
      0%, 100% { box-shadow: 0 0 0 rgba(242,184,128,0), 0 0 18px rgba(122,92,255,0.16); }
      50% { box-shadow: 0 0 18px rgba(242,184,128,0.14), 0 0 30px rgba(122,92,255,0.24); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.95; }
      50% { transform: translateX(-50%) scale(1.08); opacity: 0.7; }
    }

    @keyframes groundPulse {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
    }

    @media (max-width: 768px) {
      .content {
        margin-top: -2vh;
        width: 92%;
      }

      h1 {
        font-size: clamp(2.2rem, 11vw, 3.6rem);
      }

      .subtitle {
        font-size: 0.96rem;
        line-height: 1.75;
      }

      .tower-scene {
        width: 120px;
        height: 48vh;
        bottom: 10vh;
      }

      .tower {
        width: 88px;
      }

      .waist {
        width: 64px;
        height: 132px;
      }

      .glow-ring {
        width: 78px;
      }

      .ground-glow {
        width: 72vw;
      }

      .city-line {
        height: 18vh;
      }

      .enter-btn {
        padding: 0.9rem 1.4rem;
        font-size: 0.9rem;
      }

      .beam-3 {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="landing">
    <div class="light-beam beam-1"></div>
    <div class="light-beam beam-2"></div>
    <div class="light-beam beam-3"></div>

    <div class="particles" aria-hidden="true">
      <span style="left:8%; bottom:5%; animation-duration:12s; animation-delay:0s;"></span>
      <span style="left:14%; bottom:8%; animation-duration:10s; animation-delay:1s;"></span>
      <span style="left:22%; bottom:2%; animation-duration:13s; animation-delay:2.8s;"></span>
      <span style="left:30%; bottom:10%; animation-duration:11s; animation-delay:1.6s;"></span>
      <span style="left:42%; bottom:3%; animation-duration:14s; animation-delay:0.6s;"></span>
      <span style="left:50%; bottom:7%; animation-duration:9s; animation-delay:2s;"></span>
      <span style="left:58%; bottom:5%; animation-duration:12s; animation-delay:3s;"></span>
      <span style="left:68%; bottom:4%; animation-duration:11s; animation-delay:0.8s;"></span>
      <span style="left:76%; bottom:8%; animation-duration:10s; animation-delay:1.8s;"></span>
      <span style="left:84%; bottom:6%; animation-duration:13s; animation-delay:2.2s;"></span>
      <span style="left:91%; bottom:2%; animation-duration:12s; animation-delay:0.3s;"></span>
    </div>

    <section class="content">
      <div class="eyebrow">Pearl River • Heritage • Skyline</div>
      <h1>Discover<br>Guangzhou</h1>
      <p class="subtitle">
        A city where glowing towers meet old streets, where river lights, heritage, and unforgettable food shape every moment.
      </p>
      <a class="enter-btn" href="guangzhou.html">
        Start Journey <span>→</span>
      </a>
    </section>

    <div class="ground-glow"></div>

    <div class="tower-scene" aria-hidden="true">
      <div class="tower" id="tower">
        <div class="antenna"></div>
        <div class="top-sphere"></div>
        <div class="shaft"></div>
        <div class="waist"></div>
        <div class="glow-ring"></div>
        <div class="mid-sphere"></div>
        <div class="base"></div>
      </div>
    </div>

    <div class="city-line"></div>
  </main>

  <script>
    window.addEventListener("load", () => {
      const tower = document.getElementById("tower");
      setTimeout(() => {
        tower.classList.add("rise");
      }, 500);
    });
  </script>
</body>
</html>
